<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜のルーティーンアプリ</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 12px;
  margin: 8px;
  width: 80%;
  font-size: 16px;
}

.incomplete {
  background: #3a0000;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.85; }
  100% { opacity: 1; }
}

.phone-off {
  font-size: 1.3em;
  border: 2px solid #fff;
}

.spacer {
  height: 48px;
}
</style>
</head>

<body>

<h2>夜のルーティーン</h2>

<button id="bathBtn" onclick="toggleTask('bath')">風呂</button>
<button id="medicineBtn" onclick="toggleTask('medicine')">服薬</button>
<button id="phoneBtn" class="phone-off" onclick="toggleTask('phoneOff')">スマホ終了</button>

<hr>

<button onclick="resetToday()">今日リセット</button>

<div class="spacer"></div>

<button onclick="undoLast()">1つ戻す</button>

<h3 id="streak"></h3>
<div id="message"></div>

<script>
let actionStack = [];

function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}

function getLogs() {
  return JSON.parse(localStorage.getItem("logs") || "{}");
}

function saveLogs(logs) {
  localStorage.setItem("logs", JSON.stringify(logs));
}

function toggleTask(taskName) {
  const today = getTodayKey();
  const logs = getLogs();

  const prev = logs[today]?.[taskName] || false;

  actionStack.push({
    date: today,
    task: taskName,
    prevValue: prev
  });

  logs[today] = logs[today] || {};
  logs[today][taskName] = !prev;

  saveLogs(logs);
  renderAll();
}

function undoLast() {
  const last = actionStack.pop();
  if (!last) return;

  const logs = getLogs();
  logs[last.date] = logs[last.date] || {};
  logs[last.date][last.task] = last.prevValue;

  saveLogs(logs);
  renderAll();
}

function resetToday() {
  const today = getTodayKey();
  const logs = getLogs();

  delete logs[today];

  saveLogs(logs);
  renderAll();
}

function calculateStreak(logs) {
  const dates = Object.keys(logs).sort().reverse();
  let streak = 0;

  for (let d of dates) {
    const day = logs[d];
    if (day.bath && day.medicine && day.phoneOff) {
      streak++;
    } else {
      break;
    }
  }
  return streak;
}

function renderAll() {
  const logs = getLogs();
  const today = getTodayKey();
  const todayData = logs[today] || {};

  updateButton("bathBtn", todayData.bath);
  updateButton("medicineBtn", todayData.medicine);
  updateButton("phoneBtn", todayData.phoneOff);

  const streak = calculateStreak(logs);
  document.getElementById("streak").innerText = "ストリーク: " + streak;

  const complete = todayData.bath && todayData.medicine && todayData.phoneOff;

  const msg = document.getElementById("message");

  if (complete) {
    msg.innerText = "完了：習慣維持成功";
  } else if (streak >= 3) {
    msg.innerText = "警告：連続記録が途切れます";
  } else {
    msg.innerText = "";
  }
}

function updateButton(id, done) {
  const btn = document.getElementById(id);

  if (done) {
    btn.classList.remove("incomplete");
    btn.style.background = "#2e7d32";
  } else {
    btn.style.background = "";
    btn.classList.add("incomplete");
  }
}

renderAll();
</script>

</body>
</html>
