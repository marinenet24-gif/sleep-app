<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寝落ち防止チェッカー</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; background:#f0f2f5; text-align:center; padding:20px;}
.card { background:white; border-radius:15px; padding:20px; margin-bottom:20px;}
button { width:100%; padding:12px; margin:8px 0; border-radius:10px;}
.btn-on { background:#4CAF50; color:white;}
</style>
</head>

<body>

<div class="card">
<h2 id="statusMsg">夜のルーティン</h2>

<button id="bathBtn" onclick="complete('bath')">風呂</button>
<button id="medsBtn" onclick="complete('meds')">服薬</button>
<button id="phoneBtn" onclick="complete('phone')">スマホ終了</button>

<button onclick="requestNotification()">通知を有効化</button>
</div>

<script>
const DEADLINE="23:00";
const NOTIFY_TIME="22:30";

let status=JSON.parse(localStorage.getItem('status'))||{bath:false,meds:false,phone:false};
let logs=JSON.parse(localStorage.getItem('logs'))||[];

function save(){localStorage.setItem('status',JSON.stringify(status));}

function complete(type){
 const now=new Date();
 status[type]=true;
 save();
 document.getElementById(type+"Btn").className="btn-on";

 if(status.bath&&status.meds&&status.phone){
   const time=now.toTimeString().slice(0,5);
   logs.push({date:now.toISOString().slice(0,10),finish:time,success:time<=DEADLINE});
   localStorage.setItem('logs',JSON.stringify(logs));
   document.getElementById("statusMsg").innerText="完了";
 }
}

// ===== 通知許可 =====
async function requestNotification(){
 const permission = await Notification.requestPermission();
 if(permission==="granted"){
   alert("通知が有効になりました");
   scheduleCheck();
 }
}

// ===== 定期チェック（ページ開いている時）=====
function scheduleCheck(){
 setInterval(()=>{
   const now=new Date().toTimeString().slice(0,5);

   if(now===NOTIFY_TIME){
     if(!(status.bath && status.meds && status.phone)){
       new Notification("寝る準備をしてください",{
         body:"まだ完了していません",
       });
     }
   }
 },60000);
}

// ===== Service Worker登録＆安全更新 =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {

    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;

      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          if (confirm('アプリ更新があります。更新しますか？')) {
            newWorker.postMessage('SKIP_WAITING');
          }
        }
      });
    });

    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });

  });
}
</script>

</body>
</html>
