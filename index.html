<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寝落ち防止チェッカー</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; background:#f0f2f5; text-align:center; padding:20px;}
.card { background:white; border-radius:15px; padding:20px; margin-bottom:20px;}
button { width:100%; padding:10px; margin:5px 0; border-radius:10px;}
.btn-on { background:#4CAF50; color:white;}
.grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
.day { padding:6px; font-size:11px; border-radius:5px;}
.good { background:#4CAF50; color:white;}
.bad { background:#ccc;}
.warn { background:#ff9800; color:white;}
</style>
</head>

<body>

<div class="card">
<h2 id="statusMsg">夜のルーティン</h2>

<button id="bathBtn" onclick="complete('bath')">風呂</button>
<button id="medsBtn" onclick="complete('meds')">服薬</button>
<button id="phoneBtn" onclick="complete('phone')">スマホ終了</button>

<button onclick="undoLast()">1つ戻す</button>
<button onclick="resetToday()">今日リセット</button>

<button onclick="showAnalysis()">AI分析</button>
</div>

<div class="card">
<h3>就寝時刻（折れ線）</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>ヒートマップ（30日）</h3>
<div id="heatmap" class="grid"></div>
</div>

<div class="card">
<h3>カレンダー</h3>
<div id="calendar" class="grid"></div>
</div>

<script>
const DEADLINE="23:30";
const ALERT_TIME="23:00";

let status=JSON.parse(localStorage.getItem('status'))||{bath:false,meds:false,phone:false};
let logs=JSON.parse(localStorage.getItem('logs'))||[];
let history=[];

function save(){localStorage.setItem('status',JSON.stringify(status));}

function vibrate(p=[100]){if(navigator.vibrate)navigator.vibrate(p);}

// ===== 通知（時間チェック）=====
function checkTime(){
 const now=new Date().toTimeString().slice(0,5);
 if(now===ALERT_TIME){
   document.getElementById("statusMsg").innerText="そろそろ寝る準備";
   vibrate([300,100,300]);
 }
}
setInterval(checkTime,60000);

// ===== 操作 =====
function complete(type){
 history.push(JSON.stringify(status));

 status[type]=true;
 save();

 document.getElementById(type+"Btn").className="btn-on";

 if(status.bath&&status.meds&&status.phone){
   const now=new Date();
   const time=now.toTimeString().slice(0,5);
   logs.push({date:now.toISOString().slice(0,10),finish:time,success:time<=DEADLINE});
   localStorage.setItem('logs',JSON.stringify(logs));
   document.getElementById("statusMsg").innerText="完了";
   vibrate([200,100,200]);
 }
}

// ===== 誤操作対策 =====
function undoLast(){
 if(history.length===0)return;
 status=JSON.parse(history.pop());
 save();
 location.reload();
}

function resetToday(){
 if(confirm("今日の状態をリセットしますか？")){
   status={bath:false,meds:false,phone:false};
   save();
   location.reload();
 }
}

// ===== グラフ =====
function renderLine(){
 const last=logs.slice(-7);
 if(last.length===0)return;

 const labels=last.map(l=>l.date.slice(5));
 const data=last.map(l=>parseInt(l.finish.split(":")[0]));

 new Chart(document.getElementById('lineChart'),{
  type:'line',
  data:{labels,datasets:[{label:'就寝時刻',data}]}
 });
}

// ===== ヒートマップ =====
function renderHeatmap(){
 const el=document.getElementById('heatmap');
 el.innerHTML="";
 logs.slice(-30).forEach(l=>{
   const d=document.createElement("div");
   d.className="day "+(l.success?"good":"bad");
   d.innerText=l.date.slice(5);
   el.appendChild(d);
 });
}

// ===== カレンダー =====
function renderCalendar(){
 const el=document.getElementById('calendar');
 el.innerHTML="";
 logs.slice(-30).forEach(l=>{
   const d=document.createElement("div");
   d.className="day "+(l.success?"good":"good");
   d.innerText=l.date.slice(8);
   el.appendChild(d);
 });
}

// ===== AI分析 =====
function analyzeAI(){
 if(logs.length<3)return"データ不足";

 const late=logs.filter(l=>!l.success).length;
 const rate=((logs.length-late)/logs.length*100).toFixed(0);

 let msg=`成功率${rate}%\n`;

 if(rate<50) msg+="生活リズムが不安定\n";
 else if(rate<80) msg+="スマホ時間改善推奨\n";
 else msg+="良好な習慣";

 return msg;
}

function showAnalysis(){alert(analyzeAI());}

// ===== SW（安全更新：確認あり）=====
if('serviceWorker'in navigator){
 navigator.serviceWorker.register('sw.js').then(reg=>{
   reg.addEventListener('updatefound',()=>{
     const newWorker=reg.installing;
     newWorker.addEventListener('statechange',()=>{
       if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
         if(confirm("新しいバージョンがあります。更新しますか？")){
           newWorker.postMessage('SKIP_WAITING');
         }
       }
     });
   });
   navigator.serviceWorker.addEventListener('controllerchange',()=>{
     window.location.reload();
   });
 });
}

window.onload=()=>{
 renderLine();
 renderHeatmap();
 renderCalendar();
};
</script>

</body>
</html>
