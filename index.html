<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜のルーティン</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:sans-serif; background:#b2dfdb; text-align:center; padding:20px;}
.card { background:white; border-radius:15px; padding:20px; margin-bottom:20px;}

button { width:100%; padding:12px; margin:6px 0; border-radius:10px; font-size:16px; border:none; cursor:pointer; background:#e0e0e0; color:#333;}

.btn-on { background:#4CAF50; color:white;}
.btn-spacer { visibility:hidden; pointer-events:none; }

.grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
.day { padding:6px; font-size:11px; border-radius:5px;}
.good { background:#4CAF50; color:white;}
.bad { background:#ccc;}

#streak { font-size:24px; font-weight:bold; color:#1565c0;}
</style>
</head>

<body>

<!-- 設定パネル オーバーレイ -->
<div id="settingsPanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center; overflow-y:auto;">
  <div style="background:white; border-radius:15px; padding:24px; width:88%; max-width:360px; position:relative; margin:20px auto;">

    <h3 style="margin:0 0 16px; font-size:17px;">設定 — 達成課題の名前変更</h3>
    <div style="display:flex; align-items:center; margin-bottom:12px; gap:8px;">
      <span style="width:80px; font-size:14px; flex-shrink:0; text-align:left;">達成課題１</span>
      <input id="labelInput_bath" type="text" placeholder="例：風呂" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:8px; font-size:14px;">
      <button onclick="applyLabel('bath')" style="width:auto; padding:8px 12px; font-size:13px; background:#4CAF50; color:white; border-radius:8px; margin:0;">変更</button>
    </div>
    <div style="display:flex; align-items:center; margin-bottom:12px; gap:8px;">
      <span style="width:80px; font-size:14px; flex-shrink:0; text-align:left;">達成課題２</span>
      <input id="labelInput_meds" type="text" placeholder="例：服薬" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:8px; font-size:14px;">
      <button onclick="applyLabel('meds')" style="width:auto; padding:8px 12px; font-size:13px; background:#4CAF50; color:white; border-radius:8px; margin:0;">変更</button>
    </div>
    <div style="display:flex; align-items:center; margin-bottom:20px; gap:8px;">
      <span style="width:80px; font-size:14px; flex-shrink:0; text-align:left;">達成課題３</span>
      <input id="labelInput_phone" type="text" placeholder="例：スマホ終了" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:8px; font-size:14px;">
      <button onclick="applyLabel('phone')" style="width:auto; padding:8px 12px; font-size:13px; background:#4CAF50; color:white; border-radius:8px; margin:0;">変更</button>
    </div>

    <!-- 区切り線 -->
    <hr style="border:none; border-top:1px solid #e0e0e0; margin:0 0 16px;">

    <h3 style="margin:0 0 12px; font-size:17px;">過去データの手入力</h3>
    <p style="font-size:12px; color:#888; margin:0 0 12px; text-align:left;">日付と就寝時刻を入力して追加できます。同じ日付は上書きされます。</p>

    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <div style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; flex:1;">
        <label style="font-size:12px; color:#666;">日付</label>
        <input id="manualDate" type="date" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:8px; font-size:14px; box-sizing:border-box;">
      </div>
      <div style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; flex:1;">
        <label style="font-size:12px; color:#666;">就寝時刻</label>
        <input id="manualTime" type="time" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:8px; font-size:14px; box-sizing:border-box;">
      </div>
    </div>

    <div id="manualMsg" style="font-size:13px; color:#e53935; min-height:18px; text-align:left; margin-bottom:8px;"></div>

    <button onclick="addManualLog()" style="background:#1565c0; color:white; font-size:15px; margin:0 0 16px;">追加する</button>

    <!-- 手入力済みログ一覧 -->
    <div id="manualLogList" style="text-align:left; font-size:13px; color:#555; max-height:120px; overflow-y:auto;"></div>

    <hr style="border:none; border-top:1px solid #e0e0e0; margin:16px 0 16px;">
    <button onclick="closeSettings()" style="background:#e0e0e0; color:#333; font-size:15px; margin:0;">閉じる</button>
  </div>
</div>

<div class="card" style="position:relative;">
  <!-- 設定ボタン（右上） -->
  <button onclick="openSettings()" style="position:absolute; top:14px; right:14px; width:auto; padding:4px 10px; font-size:12px; background:#e0e0e0; color:#555; border-radius:6px; margin:0;">設定</button>

  <h2 id="statusMsg">夜のルーティン</h2>

  <div id="streak">📈 連続成功 0日</div>

  <button id="bathBtn" onclick="complete('bath')">風呂</button>
  <button id="medsBtn" onclick="complete('meds')">服薬</button>
  <button id="phoneBtn" onclick="complete('phone')">スマホ終了</button>

  <button onclick="undoLast()">1つ戻す</button>

  <!-- 空白スペース（ボタン1つ分） -->
  <button class="btn-spacer" disabled>spacer</button>

  <button onclick="showResetConfirm()">今日リセット</button>

  <!-- リセット確認UI -->
  <div id="resetConfirm" style="display:none; background:#fff3cd; border-radius:10px; padding:10px; margin:6px 0;">
    <p style="margin:0 0 8px; font-size:14px;">今日の記録を消去しますか？</p>
    <button onclick="doReset()" style="background:#e53935; color:white; margin:3px 0;">消去する</button>
    <button onclick="hideResetConfirm()" style="margin:3px 0;">キャンセル</button>
  </div>

  <button onclick="showAnalysis()">AI分析</button>
</div>

<div class="card">
  <h3>就寝時刻（折れ線）</h3>
  <canvas id="lineChart"></canvas>
</div>

<div class="card">
  <h3>ヒートマップ</h3>
  <div id="heatmap" class="grid"></div>
</div>

<script>
const DEADLINE = "23:30";

let status = JSON.parse(localStorage.getItem('status')) || {bath:false, meds:false, phone:false};
let logs   = JSON.parse(localStorage.getItem('logs'))   || [];
let undoStack = JSON.parse(sessionStorage.getItem('undoStack')) || [];

// ===== ラベル管理 =====
const DEFAULT_LABELS = {bath:"風呂", meds:"服薬", phone:"スマホ終了"};
let labels = JSON.parse(localStorage.getItem('labels')) || {...DEFAULT_LABELS};

function saveLabels() {
  localStorage.setItem('labels', JSON.stringify(labels));
}

function renderLabels() {
  ['bath','meds','phone'].forEach(k => {
    document.getElementById(k + "Btn").innerText = labels[k];
  });
}

function openSettings() {
  ['bath','meds','phone'].forEach(k => {
    document.getElementById('labelInput_' + k).value = labels[k];
  });
  // 今日の日付をデフォルトにセット
  document.getElementById('manualDate').value = getTodayJST();
  document.getElementById('manualTime').value = '';
  document.getElementById('manualMsg').innerText = '';
  renderManualLogList();
  const p = document.getElementById('settingsPanel');
  p.style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settingsPanel').style.display = 'none';
}

function applyLabel(key) {
  const val = document.getElementById('labelInput_' + key).value.trim();
  if (!val) return;
  labels[key] = val;
  saveLabels();
  renderLabels();
}

// ===== 過去データ手入力 =====
function addManualLog() {
  const dateVal = document.getElementById('manualDate').value; // "2025-04-29"
  const timeVal = document.getElementById('manualTime').value; // "23:15"
  const msgEl   = document.getElementById('manualMsg');

  if (!dateVal) { msgEl.innerText = '日付を入力してください'; return; }
  if (!timeVal) { msgEl.innerText = '就寝時刻を入力してください'; return; }

  const entry = { date: dateVal, finish: timeVal, success: timeVal <= DEADLINE };
  const idx = logs.findIndex(l => l.date === dateVal);
  if (idx >= 0) {
    logs[idx] = entry;
    msgEl.style.color = '#1565c0';
    msgEl.innerText = `${dateVal} のデータを上書きしました`;
  } else {
    logs.push(entry);
    // 日付順にソート
    logs.sort((a, b) => a.date.localeCompare(b.date));
    msgEl.style.color = '#4CAF50';
    msgEl.innerText = `${dateVal} のデータを追加しました`;
  }

  save();
  renderManualLogList();
  renderStreak();
  refreshCharts();
}

function renderManualLogList() {
  const el = document.getElementById('manualLogList');
  if (!el) return;
  if (logs.length === 0) { el.innerHTML = '<span style="color:#aaa;">データなし</span>'; return; }

  const recent = logs.slice().reverse().slice(0, 10); // 直近10件
  el.innerHTML = '<div style="font-size:12px; color:#999; margin-bottom:4px;">直近の記録（最大10件）</div>' +
    recent.map(l =>
      `<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #f0f0f0;">
        <span>${l.date}</span>
        <span>${l.finish}</span>
        <span style="color:${l.success ? '#4CAF50' : '#e53935'}">${l.success ? '✓ 成功' : '✗ 超過'}</span>
        <button onclick="deleteManualLog('${l.date}')" style="width:auto; padding:2px 8px; font-size:11px; background:#f5f5f5; color:#e53935; margin:0; border-radius:4px;">削除</button>
      </div>`
    ).join('');
}

function deleteManualLog(date) {
  logs = logs.filter(l => l.date !== date);
  save();
  renderManualLogList();
  renderStreak();
  refreshCharts();
  document.getElementById('manualMsg').style.color = '#888';
  document.getElementById('manualMsg').innerText = `${date} のデータを削除しました`;
}

// ===== 今日の日付（JST） =====
function getTodayJST() {
  const now = new Date();
  const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  return jst.toISOString().slice(0, 10);
}
function save() {
  localStorage.setItem('status', JSON.stringify(status));
  localStorage.setItem('logs',   JSON.stringify(logs));
  sessionStorage.setItem('undoStack', JSON.stringify(undoStack));
}

// ===== ストリーク計算 =====
function calcStreak() {
  let streak = 0;
  for (let i = logs.length - 1; i >= 0; i--) {
    if (logs[i].success) streak++;
    else break;
  }
  return streak;
}

// ===== 表示 =====
function renderStreak() {
  const s = calcStreak();
  const el = document.getElementById("streak");
  el.innerText = `📈 連続成功 ${s}日`;
  el.style.color = s >= 3 ? "#4CAF50" : "#1565c0";
}

function renderButtons() {
  ['bath','meds','phone'].forEach(type => {
    const btn = document.getElementById(type + "Btn");
    btn.className = status[type] ? "btn-on" : "";
  });
}

// ===== 操作 =====
function complete(type) {
  if (status[type]) return; // 既にONなら無視

  // スナップショット保存（Undo用）
  undoStack.push({ status: JSON.stringify(status), logs: JSON.stringify(logs) });

  status[type] = true;
  save();
  renderButtons();

  // 3つ全部完了したらログ記録
  if (status.bath && status.meds && status.phone) {
    const now  = new Date();
    const time = now.toTimeString().slice(0, 5);
    const today = getTodayJST();

    // 今日のログが既にあれば上書き
    const idx = logs.findIndex(l => l.date === today);
    const entry = { date: today, finish: time, success: time <= DEADLINE };
    if (idx >= 0) logs[idx] = entry;
    else logs.push(entry);

    save();
    document.getElementById("statusMsg").innerText = "完了";
    renderStreak();
    refreshCharts();
  }
}

// ===== Undo（1項目だけ戻す） =====
function undoLast() {
  if (undoStack.length === 0) return;

  const snap = undoStack.pop();
  const prevStatus = JSON.parse(snap.status);
  const prevLogs   = JSON.parse(snap.logs);

  // どのキーが変わったか特定して1つだけ戻す
  const keys = ['bath','meds','phone'];
  let undoneKey = null;
  for (const k of keys) {
    if (prevStatus[k] !== status[k]) {
      status[k] = prevStatus[k];
      undoneKey = k;
      break; // 1項目だけ
    }
  }

  // ログも前の状態に戻す（完了が取り消された場合）
  logs = prevLogs;

  save();
  renderButtons();
  renderStreak();
  refreshCharts();

  if (undoneKey) {
    document.getElementById("statusMsg").innerText = `「${labelOf(undoneKey)}」を元に戻しました`;
  }
  if (!(status.bath && status.meds && status.phone)) {
    document.getElementById("statusMsg").innerText =
      (document.getElementById("statusMsg").innerText === "完了") ? "未完了：今すぐ行動" :
      document.getElementById("statusMsg").innerText;
  }
}

function labelOf(key) {
  return labels[key] || DEFAULT_LABELS[key];
}

// ===== 今日リセット =====
function showResetConfirm() {
  document.getElementById("resetConfirm").style.display = "block";
}

function hideResetConfirm() {
  document.getElementById("resetConfirm").style.display = "none";
}

function doReset() {
  hideResetConfirm();

  // statusのみリセット（logsは削除しない）
  status = {bath:false, meds:false, phone:false};
  undoStack = [];

  save();
  renderButtons();
  renderStreak();
  refreshCharts();

  document.getElementById("statusMsg").innerText = "未完了：今すぐ行動";
  document.body.style.background = "#b2dfdb";
}

// ===== グラフ =====
let lineChartInstance = null;

function renderLine() {
  const last = logs.slice(-7);
  const ctx  = document.getElementById('lineChart');

  if (lineChartInstance) {
    lineChartInstance.destroy();
    lineChartInstance = null;
  }
  if (last.length === 0) return;

  const labels = last.map(l => l.date.slice(5));
  const data   = last.map(l => {
    const parts = l.finish.split(":");
    return parseInt(parts[0]) + parseInt(parts[1]) / 60;
  });

  lineChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '就寝時刻',
        data,
        borderColor: '#4CAF50',
        tension: 0.3,
        fill: false
      }]
    },
    options: {
      scales: {
        y: {
          ticks: {
            callback: v => `${Math.floor(v)}:${String(Math.round((v%1)*60)).padStart(2,'0')}`
          }
        }
      }
    }
  });
}

// ===== ヒートマップ =====
function renderHeatmap() {
  const el = document.getElementById('heatmap');
  el.innerHTML = "";
  logs.slice(-30).forEach(l => {
    const d = document.createElement("div");
    d.className = "day " + (l.success ? "good" : "bad");
    d.innerText  = l.date.slice(5);
    el.appendChild(d);
  });
}

function refreshCharts() {
  renderLine();
  renderHeatmap();
}

// ===== AI分析 =====
function analyzeAI() {
  if (logs.length < 3) return "データ不足（3日以上記録してください）";
  const rate = ((logs.filter(l => l.success).length / logs.length) * 100).toFixed(0);
  let msg = `成功率 ${rate}%\n`;
  if (rate < 50)      msg += "生活崩壊レベル";
  else if (rate < 80) msg += "スマホ制限が鍵";
  else                msg += "習慣化成功！";
  return msg;
}

function showAnalysis() { alert(analyzeAI()); }

// ===== 深夜0時 自動リセット（ログは残す・statusのみ） =====
function scheduleMidnightReset() {
  const now = new Date();
  // JST 翌00:00 を UTC で求める
  // JST 00:00 = UTC 前日 15:00
  const nowJST = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  // UTC基準で「今日のJST 00:00」= 今日UTC 15:00（前日JST換算）
  const todayUTC15 = new Date(Date.UTC(
    nowJST.getUTCFullYear(),
    nowJST.getUTCMonth(),
    nowJST.getUTCDate(),
    15, 0, 0, 0
  ));
  // すでに過ぎていれば翌日のUTC 15:00へ
  if (now.getTime() >= todayUTC15.getTime()) {
    todayUTC15.setUTCDate(todayUTC15.getUTCDate() + 1);
  }
  const msUntil = todayUTC15.getTime() - now.getTime();

  setTimeout(() => {
    // statusのみリセット（logsは削除しない）
    status = {bath:false, meds:false, phone:false};
    undoStack = [];
    save();
    renderLabels();
    renderButtons();
    renderStreak();
    refreshCharts();
    document.getElementById("statusMsg").innerText = "未完了：今すぐ行動";
    document.body.style.background = "#b2dfdb";

    // 翌日以降も繰り返す
    scheduleMidnightReset();
  }, msUntil);
}

// ===== 初期表示 =====
window.onload = () => {
  renderLabels();
  renderButtons();
  renderLine();
  renderHeatmap();
  renderStreak();
  scheduleMidnightReset(); // 深夜0時自動リセット開始

  if (!(status.bath && status.meds && status.phone)) {
    document.body.style.background = "#b2dfdb";
    document.getElementById("statusMsg").innerText = "未完了：今すぐ行動";
  } else {
    document.getElementById("statusMsg").innerText = "完了";
  }
};
</script>

</body>
</html>
