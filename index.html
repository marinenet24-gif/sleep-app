<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜のルーティーン</title>

<style>
body {
  background:#111; color:#fff; text-align:center; font-family:sans-serif;
}
button {
  width:80%; padding:14px; margin:8px;
  background:#444; color:#fff; border:none;
}
.incomplete {
  background:#3a0000;
  animation:pulse 2s infinite;
}
@keyframes pulse {
  0%{opacity:1;}50%{opacity:0.85;}100%{opacity:1;}
}
.phone-off {
  font-size:1.2em; border:2px solid #fff;
}
.spacer { height:48px; }
</style>
</head>

<body>

<h2>夜のルーティーン</h2>

<button id="bathBtn" onclick="toggleTask('bath')">風呂</button>
<button id="medicineBtn" onclick="toggleTask('medicine')">服薬</button>
<button id="phoneBtn" class="phone-off" onclick="toggleTask('phoneOff')">スマホ終了</button>

<hr>

<button onclick="resetToday()">今日リセット</button>
<div class="spacer"></div>
<button onclick="undoLast()">1つ戻す</button>

<h3 id="streak"></h3>
<div id="message"></div>

<script>
// ==========================
// Storage
// ==========================
function getEvents() {
  return JSON.parse(localStorage.getItem("events") || "[]");
}
function saveEvents(events) {
  localStorage.setItem("events", JSON.stringify(events));
}

// ==========================
// Event Push
// ==========================
function pushEvent(e) {
  const events = getEvents();

  events.push({
    ...e,
    id: crypto.randomUUID(),
    ts: Date.now()
  });

  saveEvents(events);
  renderAll();
}

// ==========================
// Core Actions
// ==========================
function toggleTask(task) {
  const today = getTodayKey();
  const state = rebuildState(getEvents());
  const current = state.logs[today]?.[task] || false;

  pushEvent({
    type: "TOGGLE_TASK",
    date: today,
    payload: { task, value: !current }
  });
}

function resetToday() {
  pushEvent({
    type: "RESET_DAY",
    date: getTodayKey()
  });
}

function undoLast() {
  const events = getEvents();
  if (!events.length) return;

  events.pop(); // ★ 完全Undo（時間巻き戻し）

  saveEvents(events);
  renderAll();
}

// ==========================
// State Rebuild（核心）
// ==========================
function rebuildState(events) {
  const state = { logs:{} };

  events.sort((a,b)=>a.ts-b.ts).forEach(e => {
    const d = e.date;

    if (e.type === "TOGGLE_TASK") {
      state.logs[d] = state.logs[d] || {};
      state.logs[d][e.payload.task] = e.payload.value;
    }

    if (e.type === "RESET_DAY") {
      delete state.logs[d];
    }
  });

  return state;
}

// ==========================
// Render
// ==========================
function renderAll() {
  const state = rebuildState(getEvents());
  const logs = state.logs;
  const today = getTodayKey();
  const todayData = logs[today] || {};

  updateBtn("bathBtn", todayData.bath);
  updateBtn("medicineBtn", todayData.medicine);
  updateBtn("phoneBtn", todayData.phoneOff);

  const streak = calculateStreak(logs);
  document.getElementById("streak").innerText = "ストリーク: " + streak;

  const complete = todayData.bath && todayData.medicine && todayData.phoneOff;

  const msg = document.getElementById("message");

  if (complete) {
    msg.innerText = "完了：習慣維持成功";
  } else if (streak >= 3) {
    msg.innerText = "警告：連続記録が途切れます";
  } else {
    msg.innerText = "";
  }

  // 拡張用（グラフ・ヒートマップ・AI）
  renderGraph(logs);
  renderHeatmap(logs);
  renderAI(logs);
}

// ==========================
// UI Helpers
// ==========================
function updateBtn(id, done) {
  const btn = document.getElementById(id);

  if (done) {
    btn.classList.remove("incomplete");
    btn.style.background = "#2e7d32";
  } else {
    btn.classList.add("incomplete");
    btn.style.background = "";
  }
}

// ==========================
// Logic
// ==========================
function calculateStreak(logs) {
  const dates = Object.keys(logs).sort().reverse();
  let streak = 0;

  for (let d of dates) {
    const x = logs[d];
    if (x.bath && x.medicine && x.phoneOff) streak++;
    else break;
  }
  return streak;
}

// ==========================
// Placeholder（あとで実装）
// ==========================
function renderGraph(logs) {
  // 折れ線グラフ（就寝時刻）
}
function renderHeatmap(logs) {
  // ヒートマップ
}
function renderAI(logs) {
  // AI分析
}

// ==========================
function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}

renderAll();
</script>

</body>
</html>
